<svg viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <!-- LODGRA LOGO — horizontal (icon + wordmark) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,2)">
    <!-- Roof: gold -->
    <polyline stroke="#D4AF37" stroke-width="4.5" points="8,33 30,9 52,33"/>
    <!-- Body: blue -->
    <path stroke="#1E3A8A" stroke-width="4.5" d="M17,33 L17,52 Q17,54 19,54 L41,54 Q43,54 43,52 L43,33"/>
  </g>
  <!-- Wordmark -->
  <text
    x="66" y="42"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="700"
    fill="#1E3A8A"
    letter-spacing="-0.5">Lodgra</text>
</svg>
