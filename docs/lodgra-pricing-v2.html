<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f9fb;--bg3:#f1f4f8;
  --txt:#0d1117;--txt2:#4a5568;--txt3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#2563eb;--accent-bg:#eff4ff;--accent-dark:#1d4ed8;
  --success:#16a34a;--success-bg:#f0fdf4;--success-txt:#15803d;
  --warn:#b45309;--warn-bg:#fffbeb;
  --font-h:'Syne',system-ui,sans-serif;
  --font-b:'DM Sans',system-ui,sans-serif;
  --r:10px;--rl:16px;
}
body{font-family:var(--font-b);background:var(--bg);color:var(--txt);font-size:15px;line-height:1.6}

nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:var(--font-h);font-size:20px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%}
.tagline{font-size:11px;color:var(--txt3);font-weight:400;margin-left:4px}

.switcher{display:flex;gap:3px;background:var(--bg3);padding:4px;border-radius:var(--r);border:1px solid var(--border)}
.mbt{display:flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid transparent;background:transparent;border-radius:8px;cursor:pointer;font-family:var(--font-b);font-size:12.5px;color:var(--txt2);transition:all .15s}
.mbt:hover{color:var(--txt);background:rgba(255,255,255,.7)}
.mbt.active{background:var(--bg);color:var(--txt);font-weight:500;border-color:var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}

.hero{text-align:center;padding:4.5rem 2rem 3.5rem;max-width:660px;margin:0 auto}
.eyebrow{font-size:11.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem}
.hero h1{font-family:var(--font-h);font-size:clamp(30px,4.5vw,50px);font-weight:700;line-height:1.15;letter-spacing:-.03em;margin-bottom:1.2rem}
.hero p{font-size:16px;color:var(--txt2);line-height:1.75;max-width:520px;margin:0 auto}

.anchor-bar{background:var(--success-bg);border:1px solid #bbf7d0;border-radius:var(--r);padding:.9rem 1.5rem;margin:0 2rem 2rem;max-width:1060px;margin-left:auto;margin-right:auto;display:flex;align-items:center;gap:.75rem;font-size:13.5px;color:var(--success-txt)}
.anchor-bar strong{font-weight:500}

.wrap{padding:0 2rem 5rem;max-width:1100px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2.5rem}

.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1.6rem;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s;position:relative}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:var(--border2)}
.card.feat{border:2px solid var(--accent)}
.card.feat:hover{box-shadow:0 6px 24px rgba(37,99,235,.12)}

.badge-row{height:24px;margin-bottom:.9rem}
.badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);color:var(--accent-dark);font-size:11px;font-weight:500;padding:2px 10px;border-radius:100px}

.pname{font-family:var(--font-h);font-size:17px;font-weight:600;margin-bottom:.25rem}
.pdesc{font-size:12.5px;color:var(--txt3);margin-bottom:1.4rem;min-height:32px;line-height:1.45}
.pprice{font-family:var(--font-h);font-size:34px;font-weight:700;letter-spacing:-.03em;line-height:1}
.punit{font-size:12px;color:var(--txt3);margin:.3rem 0}
.pfee{font-size:12px;color:var(--txt2);background:var(--bg3);padding:3px 9px;border-radius:100px;display:inline-block;margin-bottom:1.4rem}
.pfee-ph{height:22px;margin-bottom:1.4rem}
.pcta{margin-top:auto;padding:10px 14px;border-radius:var(--r);font-family:var(--font-b);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--bg);color:var(--txt);width:100%;text-align:center}
.pcta:hover{background:var(--bg3)}
.card.feat .pcta{background:var(--accent);color:#fff;border-color:var(--accent)}
.card.feat .pcta:hover{background:var(--accent-dark)}

.section-title{font-family:var(--font-h);font-size:13px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);margin-bottom:1.2rem;margin-top:2.5rem}

.ftable-wrap{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:2rem}
.ftable{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.ftable th{padding:10px 14px;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);background:var(--bg2);border-bottom:1px solid var(--border);text-align:center}
.ftable th:first-child{text-align:left;width:38%}
.ftable td{padding:9px 14px;border-bottom:1px solid var(--border);text-align:center;color:var(--txt2)}
.ftable td:first-child{text-align:left;color:var(--txt)}
.ftable tr:last-child td{border-bottom:none}
.ftable tr:nth-child(even) td{background:var(--bg2)}
.ftable .section-row td{background:var(--bg3);font-weight:500;font-size:11.5px;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase;padding:6px 14px}
.yes{color:var(--success);font-weight:500}
.no{color:var(--txt3)}
.dev{font-size:11px;color:var(--warn);background:var(--warn-bg);padding:1px 7px;border-radius:100px;white-space:nowrap}

.legend{display:flex;gap:1.5rem;font-size:12px;color:var(--txt3);margin-bottom:2rem;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}

.cta-sec{text-align:center;padding:4.5rem 2rem;max-width:580px;margin:0 auto}
.cta-sec h2{font-family:var(--font-h);font-size:clamp(22px,3.5vw,36px);font-weight:700;letter-spacing:-.02em;margin-bottom:1rem}
.cta-sec p{color:var(--txt2);font-size:15px;margin-bottom:2rem}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-p{background:var(--accent);color:#fff;border:none;padding:12px 26px;border-radius:var(--r);font-family:var(--font-b);font-size:14.5px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-p:hover{background:var(--accent-dark)}
.btn-s{background:var(--bg);color:var(--txt);border:1px solid var(--border2);padding:12px 26px;border-radius:var(--r);font-family:var(--font-b);font-size:14.5px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-s:hover{background:var(--bg3)}

footer{border-top:1px solid var(--border);padding:1.75rem 2rem;text-align:center;font-size:12px;color:var(--txt3)}

@media(prefers-color-scheme:dark){
  :root{--bg:#0d1117;--bg2:#161b27;--bg3:#1a2035;--txt:#eef2f8;--txt2:#8892a4;--txt3:#4b5568;--border:#1e2740;--border2:#2a3652;--accent-bg:#1a2d4a;--accent-dark:#60a5fa;--success-bg:#062412;--warn-bg:#271b05}
  nav{background:rgba(13,17,23,.94)}
  .card.feat{border-color:#3b82f6}
  .card.feat .pcta{background:#2563eb;border-color:#2563eb}
}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){
  nav{padding:1rem}
  .switcher{gap:2px}
  .mbt{padding:5px 9px;font-size:12px}
  .wrap{padding:0 1rem 3rem}
  .grid{grid-template-columns:1fr}
  .anchor-bar{margin:0 1rem 1.5rem;font-size:12.5px}
}
</style>

  if(v===false) return `<td><span class="no">—</span></td>`
  if(v==='dev') return `<td><span class="dev">em breve</span></td>`
  return '<td></td>'
}

function render(){
  const d = D[cur]
  document.getElementById('ht').innerHTML = d.hero.t.replace('\n','<br>')
  document.getElementById('hs').textContent = d.hero.s
  document.getElementById('anchor').innerHTML = d.anchor
  document.getElementById('ct').textContent = d.cta.t
  document.getElementById('cs').textContent = d.cta.s
  document.getElementById('cb1').textContent = d.cta.b1
  document.getElementById('cb2').textContent = d.cta.b2

  document.getElementById('g').innerHTML = d.plans.map(p=>`
    <div class="card ${p.k==='growth'?'feat':''}">
      <div class="badge-row">${p.b?`<span class="badge">⭐ ${p.b}</span>`:''}</div>
      <div class="pname">${p.n}</div>
      <div class="pdesc">${p.d}</div>
      <div class="pprice">${p.p}</div>
      <div class="punit">${p.u}</div>
      ${p.f?`<span class="pfee">${p.f}</span>`:`<div class="pfee-ph"></div>`}
      <button class="pcta">${p.cta}</button>
    </div>`).join('')

  const feats = FEATS[cur]
  const th = `<tr><th>Funcionalidade</th>${d.hdr.map(h=>`<th>${h}</th>`).join('')}</tr>`
  const rows = feats.map(([l,s,g,p,e])=>{
    if(s===null) return `<tr class="section-row"><td colspan="5">${l}</td></tr>`
    return `<tr><td>${l}</td>${cell(s)}${cell(g)}${cell(p)}${cell(e)}</tr>`
  }).join('')
  document.getElementById('ft').innerHTML = th+rows
}

render()
</script>
</body>
</html>
