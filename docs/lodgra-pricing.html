<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f9fb;--bg3:#f2f4f7;
  --txt:#0f1117;--txt2:#4a5060;--txt3:#9299a8;
  --border:#e2e5ec;--border2:#c8cdd8;
  --accent:#2563eb;--accent-light:#eff4ff;--accent-dark:#1d4ed8;
  --success:#16a34a;--success-bg:#f0fdf4;
  --badge-bg:#eff4ff;--badge-txt:#1d4ed8;
  --font-head:'Syne',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--txt);font-size:15px;line-height:1.6;min-height:100vh}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--txt);letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}

/* ── MARKET SWITCHER ── */
.switcher{display:flex;gap:4px;background:var(--bg3);padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.mkt-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:400;color:var(--txt2);transition:all .15s}
.mkt-btn:hover{color:var(--txt);background:rgba(255,255,255,.6)}
.mkt-btn.active{background:var(--bg);color:var(--txt);font-weight:500;box-shadow:var(--shadow);border:1px solid var(--border)}
.flag{font-size:16px;line-height:1}

/* ── HERO ── */
.hero{text-align:center;padding:5rem 2rem 4rem;max-width:680px;margin:0 auto}
.hero-eyebrow{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:1.25rem}
.hero-title{font-family:var(--font-head);font-size:clamp(32px,5vw,52px);font-weight:700;line-height:1.15;letter-spacing:-.03em;color:var(--txt);margin-bottom:1.25rem}
.hero-sub{font-size:17px;color:var(--txt2);line-height:1.7;max-width:540px;margin:0 auto}

/* ── PLANS ── */
.plans-wrap{padding:0 2rem 5rem;max-width:1100px;margin:0 auto}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:3rem}
.plan-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.75rem;display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s}
.plan-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.plan-card.featured{border:2px solid var(--accent);background:var(--bg)}
.plan-card.featured:hover{box-shadow:0 8px 24px rgba(37,99,235,.15)}
.badge-wrap{height:26px;margin-bottom:1rem}
.badge{display:inline-flex;align-items:center;background:var(--badge-bg);color:var(--badge-txt);font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px}
.plan-name{font-family:var(--font-head);font-size:18px;font-weight:600;color:var(--txt);margin-bottom:.35rem}
.plan-desc{font-size:13px;color:var(--txt3);margin-bottom:1.5rem;min-height:36px}
.plan-price-wrap{margin-bottom:.5rem}
.plan-price{font-family:var(--font-head);font-size:36px;font-weight:700;color:var(--txt);letter-spacing:-.03em}
.plan-unit{font-size:13px;color:var(--txt3);margin-bottom:.35rem}
.plan-fee{font-size:12px;color:var(--txt2);background:var(--bg3);padding:4px 10px;border-radius:100px;display:inline-block;margin-bottom:1.5rem}
.plan-fee-empty{height:26px;margin-bottom:1.5rem}
.plan-cta{margin-top:auto;padding:11px 16px;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid var(--border2);background:var(--bg);color:var(--txt);width:100%}
.plan-cta:hover{background:var(--bg3)}
.plan-card.featured .plan-cta{background:var(--accent);color:#fff;border-color:var(--accent)}
.plan-card.featured .plan-cta:hover{background:var(--accent-dark);border-color:var(--accent-dark)}

/* ── COMPARE TABLE ── */
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.compare-table{width:100%;border-collapse:collapse;font-size:13.5px;table-layout:fixed}
.compare-table th{padding:14px 18px;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);background:var(--bg2);border-bottom:1px solid var(--border);text-align:center}
.compare-table th:first-child{text-align:left;width:35%}
.compare-table td{padding:11px 18px;border-bottom:1px solid var(--border);text-align:center;color:var(--txt2)}
.compare-table td:first-child{text-align:left;color:var(--txt);font-weight:400}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:nth-child(even) td{background:var(--bg2)}
.yes{color:var(--success);font-size:15px}
.no{color:var(--txt3);font-size:17px;line-height:1}

/* ── CTA ── */
.cta-section{text-align:center;padding:5rem 2rem;max-width:600px;margin:0 auto}
.cta-title{font-family:var(--font-head);font-size:clamp(24px,4vw,38px);font-weight:700;letter-spacing:-.02em;color:var(--txt);margin-bottom:1rem}
.cta-sub{color:var(--txt2);font-size:16px;margin-bottom:2rem}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:13px 28px;border-radius:var(--radius);font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--bg);color:var(--txt);border:1.5px solid var(--border2);padding:13px 28px;border-radius:var(--radius);font-family:var(--font-body);font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:var(--bg3)}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2rem;text-align:center;font-size:12px;color:var(--txt3)}

/* ── DARK MODE ── */
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1117;--bg2:#161b27;--bg3:#1d2334;
    --txt:#f0f2f8;--txt2:#8891a8;--txt3:#4f5a6e;
    --border:#1f2840;--border2:#2d3a52;
    --badge-bg:#1e2d4a;--badge-txt:#6ea3f7;
    --success:#4ade80;--success-bg:#052e16;
  }
  nav{background:rgba(15,17,23,.92)}
  .plan-card.featured{border-color:#3b82f6}
  .plan-card.featured .plan-cta{background:#3b82f6;border-color:#3b82f6}
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  nav{padding:1rem}
  .switcher{gap:2px}
  .mkt-btn{padding:6px 10px;font-size:12px}
  .hero{padding:3rem 1.25rem 2.5rem}

  .plans-grid{grid-template-columns:1fr 1fr}
  .cta-section{padding:3rem 1.25rem}
}
@media(max-width:440px){
  .plans-grid{grid-template-columns:1fr}
}
</style>

let current = 'br';

function setMarket(m) {

  });
  render();
}

function render() {
  const d = MARKETS[current];
  document.documentElement.lang = d.lang;

  document.getElementById('hero-title').innerHTML = d.hero.title.replace('\n','<br>');
  document.getElementById('hero-sub').textContent = d.hero.sub;
  document.getElementById('cta-title').textContent = d.cta.title;
  document.getElementById('cta-sub').textContent = d.cta.sub;
  document.getElementById('cta-btn1').textContent = d.cta.btn1;
  document.getElementById('cta-btn2').textContent = d.cta.btn2;

    <div class="plan-card ${p.key==='growth'?'featured':''}">
      <div class="badge-wrap">
        ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
      </div>
      <div class="plan-name">${p.name}</div>
      <div class="plan-desc">${p.desc}</div>
      <div class="plan-price-wrap">

      </div>
      <div class="plan-unit">${p.unit}</div>
      ${p.fee ? `<span class="plan-fee">${p.fee}</span>` : `<div class="plan-fee-empty"></div>`}
      <button class="plan-cta">${p.cta}</button>
    </div>
  `).join('');

  const table = document.getElementById('compare-table');
  const headers = `<tr>
    <th>${d.featureLabel}</th>
    ${d.planHeaders.map(h=>`<th>${h}</th>`).join('')}
  </tr>`;
  const rows = d.features.map(([label,...vals])=>`
    <tr>
      <td>${label}</td>
      ${vals.map(v=>v
        ? `<td><span class="yes">&#10003;</span></td>`
        : `<td><span class="no">&#8722;</span></td>`
      ).join('')}
    </tr>
  `).join('');
  table.innerHTML = headers + rows;
}
