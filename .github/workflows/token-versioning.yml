name: Design Token Versioning

# Triggered when tokens.yaml changes on main
on:
  pull_request:
    paths:
      - 'tokens.yaml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

jobs:
  validate-tokens:
    runs-on: ubuntu-latest
    name: Validate Design Tokens

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('tokens.yaml'))" && \
          echo "✓ tokens.yaml syntax valid"

      - name: Check design tokens format
        run: |
          if grep -q "^colors:" tokens.yaml && \
             grep -q "^spacing:" tokens.yaml; then
            echo "✓ Design tokens structure valid"
          else
            echo "✗ Missing required token sections"
            exit 1
          fi

      - name: Detect version bump
        id: detect
        run: node scripts/version-tokens.js -- --check > version-check.log 2>&1 || true
        continue-on-error: true

      - name: Comment PR with version suggestion
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('version-check.log', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🎨 Design Token Validation\n\n```\n' + log + '\n```\n\nRun `npm run version:tokens` to apply version bump after PR merge.'
            });

  auto-version:
    runs-on: ubuntu-latest
    name: Auto Version Design Tokens
    needs: validate-tokens
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Auto bump version
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"

          if [ "$BUMP_TYPE" == "auto" ]; then
            npm run version:tokens
          else
            npm run version:tokens -- --$BUMP_TYPE
          fi

      - name: Push changes
        run: |
          if git diff --quiet; then
            echo "No changes to push"
          else
            git push origin main
            echo "✓ Changes pushed to remote"
          fi

  changelog-release:
    runs-on: ubuntu-latest
    name: Create Release Notes
    needs: auto-version
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' .aios/tokens/version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Extract changelog for this version
        id: changelog
        run: |
          CHANGELOG=$(sed -n '/## \[${{ steps.version.outputs.version }}\]/,/## \[/p' .aios/tokens/CHANGELOG.md | head -n -1)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: tokens-${{ steps.version.outputs.version }}
          release_name: Design Tokens v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  notify:
    runs-on: ubuntu-latest
    name: Notify Completion
    needs: [validate-tokens]
    if: always()

    steps:
      - name: Report status
        run: |
          if [ "${{ needs.validate-tokens.result }}" == "success" ]; then
            echo "✅ Token validation passed"
          else
            echo "❌ Token validation failed"
            exit 1
          fi
